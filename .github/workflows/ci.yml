name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build native shim
        run: |
          cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build --config Release --target basisu_net
          mkdir -p runtimes/osx-arm64/native
          cp native/build/out/libbasisu_net.dylib runtimes/osx-arm64/native/
      - name: Test
        run: dotnet test BasisUniversal.NET.slnx

  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
            library: libbasisu_net.so
          - os: windows-2025
            rid: win-x64
            library: basisu_net.dll
          - os: macos-15
            rid: osx-arm64
            library: libbasisu_net.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build native shim
        shell: bash
        run: |
          cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build --config Release --target basisu_net
          mkdir -p "runtimes/${{ matrix.rid }}/native"
          cp "native/build/out/${{ matrix.library }}" "runtimes/${{ matrix.rid }}/native/"
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes

  pack:
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: .
      - name: Pack
        run: dotnet pack src/BasisUniversal.NET/BasisUniversal.NET.csproj -c Release -o artifacts/packages
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/*.nupkg
